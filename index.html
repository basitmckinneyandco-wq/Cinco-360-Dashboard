<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .center {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scale-wrapper {
      width: 2000px;
      height: 2000px;
      transform: scale(0.5);  /* 👈 fake 50% zoom */
      transform-origin: center;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>
  <div class="center">
    <div class="scale-wrapper">
      <iframe
        src="https://app.powerbi.com/view?r=eyJrIjoiZjg3NmUzOTMtMDlmZS00YmYzLWE4ZWYtZjE4NDg5ZjMwNzkzIiwidCI6ImE3YTY2OWZlLWMxNDktNDNkYS04OTAyLTIxMDdhNWFkYjJiZCIsImMiOjl9">
      </iframe>
    </div>
  </div>
</body>
</html>
