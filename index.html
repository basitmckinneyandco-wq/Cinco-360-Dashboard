<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINCO 360</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .wrapper {
      width: 1024px;
      height: 804px;

      position: absolute;
      top: 0;
      left: 0;

      transform-origin: 0 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>

  <script>
    function fit() {
      const wrapper = document.querySelector('.wrapper');

      const scaleX = window.innerWidth / 1024;
      const scaleY = window.innerHeight / 804;

      const scale = Math.min(scaleX, scaleY);

      wrapper.style.transform = `scale(${scale})`;
    }

    window.addEventListener('load', fit);
    window.addEventListener('resize', fit);
  </script>
</head>

<body>
  <div class="stage">
    <div class="wrapper">
      <iframe
        src="https://app.powerbi.com/view?r=eyJrIjoiZjg3NmUzOTMtMDlmZS00YmYzLWE4ZWYtZjE4NDg5ZjMwNzkzIiwidCI6ImE3YTY2OWZlLWMxNDktNDNkYS04OTAyLTIxMDdhNWFkYjJiZCIsImMiOjl9"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
