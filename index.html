<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINCO 360</title>

  <style>
    * { margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .wrapper {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 111%;              /* slightly bigger so zoom-out doesn't show gaps */
      height: 111%;
      border: none;
      
      transform: scale(0.9);    /* 🔥 zoom out level (adjust 0.85 / 0.95 as needed) */
      transform-origin: 0 0;    /* keep it aligned to top-left */
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <iframe 
      title="Cinco BI"
      src="https://app.powerbi.com/view?r=eyJrIjoiZjg3NmUzOTMtMDlmZS00YmYzLWE4ZWYtZjE4NDg5ZjMwNzkzIiwidCI6ImE3YTY2OWZlLWMxNDktNDNkYS04OTAyLTIxMDdhNWFkYjJiZCIsImMiOjl9"
      allowFullScreen="true">
    </iframe>
  </div>
</body>
</html>
