<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINCO 360</title>

  <style>
    * { margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .wrapper {
      width: 1024px;
      height: 804px;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>

  <script>
    function fitDashboard() {
      const wrapper = document.querySelector('.wrapper');

      const scaleX = window.innerWidth / 1024;
      const scaleY = window.innerHeight / 804;

      const scale = Math.min(scaleX, scaleY);

      wrapper.style.transform = `scale(${scale})`;
    }

    window.addEventListener('load', fitDashboard);
    window.addEventListener('resize', fitDashboard);
  </script>
</head>

<body>
  <div class="wrapper">
    <iframe
      title="Cinco BI"
      src="https://app.powerbi.com/view?r=eyJrIjoiZjg3NmUzOTMtMDlmZS00YmYzLWE4ZWYtZjE4NDg5ZjMwNzkzIiwidCI6ImE3YTY2OWZlLWMxNDktNDNkYS04OTAyLTIxMDdhNWFkYjJiZCIsImMiOjl9"
      allowFullScreen="true">
    </iframe>
  </div>
</body>
</html>
