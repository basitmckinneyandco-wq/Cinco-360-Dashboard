<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CINCO Power BI Fit View</title>

<style>
  body {
    margin: 0;
    background: #0a0c10;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .wrapper {
    width: 1024px;
    height: 1060px;
    transform-origin: center center;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>

<body>

<div class="wrapper" id="wrapper">
  <iframe 
    title="Cinco BI"
    src="https://app.powerbi.com/view?r=eyJrIjoiZjg3NmUzOTMtMDlmZS00YmYzLWE4ZWYtZjE4NDg5ZjMwNzkzIiwidCI6ImE3YTY2OWZlLWMxNDktNDNkYS04OTAyLTIxMDdhNWFkYjJiZCIsImMiOjl9"
    allowfullscreen="true">
  </iframe>
</div>

<script>
  const BASE_W = 1024;
  const BASE_H = 1060;

  const wrapper = document.getElementById("wrapper");

  function fit() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const scaleX = vw / BASE_W;
    const scaleY = vh / BASE_H;

    let scale = Math.min(scaleX, scaleY);

    // prevent upscaling (keeps it "zoomed out feel")
    if (scale > 1) scale = 1;

    wrapper.style.transform = `scale(${scale})`;
  }

  window.addEventListener("resize", fit);
  window.addEventListener("load", fit);

  fit();
</script>

</body>
</html>
