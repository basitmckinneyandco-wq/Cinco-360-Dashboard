<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CINCO BI</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .frame-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;

      /* 👇 this centers it perfectly */
      transform: translate(-50%, -50%) scale(0.75);

      /* change zoom here */
      transform-origin: center;

      width: 1280px;
      height: 1600px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="frame-wrapper">
      <iframe
        title="Cinco BI"
        src="https://app.powerbi.com/view?r=eyJrIjoiZjg3NmUzOTMtMDlmZS00YmYzLWE4ZWYtZjE4NDg5ZjMwNzkzIiwidCI6ImE3YTY2OWZlLWMxNDktNDNkYS04OTAyLTIxMDdhNWFkYjJiZCIsImMiOjl9"
        allowFullScreen="true">
      </iframe>
    </div>
  </div>
</body>
</html>
