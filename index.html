<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CINCO 360</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: #000;
    }
    .wrapper {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    iframe {
      width: 1600px;
      height: 900px;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
      transform: scale(var(--scale));
    }
  </style>
  <script>
    function fitDashboard() {
      const scaleX = window.innerWidth / 1600;
      const scaleY = window.innerHeight / 900;
      const scale = Math.min(scaleX, scaleY);
      document.documentElement.style.setProperty('--scale', scale);
    }
    window.addEventListener('load', fitDashboard);
    window.addEventListener('resize', fitDashboard);
  </script>
</head>
<body>
  <div class="wrapper">
    <iframe
      src="https://app.powerbi.com/view?r=eyJrIjoiZjg3NmUzOTMtMDlmZS00YmYzLWE4ZWYtZjE4NDg5ZjMwNzkzIiwidCI6ImE3YTY2OWZlLWMxNDktNDNkYS04OTAyLTIxMDdhNWFkYjJiZCIsImMiOjl9&navContentPaneEnabled=false&filterPaneEnabled=false"
      allowfullscreen="true">
    </iframe>
  </div>
</body>
</html>
