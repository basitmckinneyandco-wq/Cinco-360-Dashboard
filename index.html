<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CINCO 360° | Full Dashboard View</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c10;
      font-family: system-ui, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    .dashboard-stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: #0a0c10;
    }

    .dashboard-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background: #0a0c10;
    }

    .dashboard-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    .controls-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 8px 16px;
      display: flex;
      gap: 12px;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      font-family: monospace;
    }

    .controls-panel button {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 14px;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .controls-panel button:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.02);
    }

    .view-mode {
      color: white;
      font-size: 13px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      background: rgba(0,120,212,0.4);
      border-radius: 30px;
      font-weight: 500;
    }

    .info-badge {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 11px;
      color: #aaa;
      font-family: monospace;
      z-index: 1000;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.1);
    }

    @media (max-width: 768px) {
      .controls-panel { padding: 6px 12px; gap: 8px; }
      .controls-panel button { padding: 6px 12px; font-size: 12px; }
      .view-mode { font-size: 11px; padding: 0 8px; }
    }
  </style>
</head>
<body>

<div class="dashboard-stage">
  <div class="dashboard-wrapper" id="dashboardWrapper">
    <iframe id="powerBiFrame" title="Cinco BI" frameborder="0" allowfullscreen="true"></iframe>
  </div>
</div>

<div class="controls-panel">
  <button id="fitToPageBtn">📐 Fit to Page (Zoomed Out)</button>
  <button id="fitToWidthBtn">📏 Fit to Width</button>
  <button id="actualSizeBtn">100% Actual Size</button>
  <span class="view-mode" id="viewModeDisplay">🌍 Fit to Page</span>
</div>
<div class="info-badge">
  ⚡ CINCO 360° | Power BI view modes • "Fit to Page" shows entire dashboard zoomed out
</div>

<script>
  (function() {
    // Base Power BI URL
    const BASE_URL = "https://app.powerbi.com/view?r=eyJrIjoiZjg3NmUzOTMtMDlmZS00YmYzLWE4ZWYtZjE4NDg5ZjMwNzkzIiwidCI6ImE3YTY2OWZlLWMxNDktNDNkYS04OTAyLTIxMDdhNWFkYjJiZCIsImMiOjl9";
    
    const iframe = document.getElementById('powerBiFrame');
    const viewModeDisplay = document.getElementById('viewModeDisplay');
    const fitToPageBtn = document.getElementById('fitToPageBtn');
    const fitToWidthBtn = document.getElementById('fitToWidthBtn');
    const actualSizeBtn = document.getElementById('actualSizeBtn');
    
    // Function to build URL with specific view mode
    // Power BI supported parameters:
    // - &pageView=fitToPage - Zooms out to show entire page
    // - &pageView=fitToWidth - Zooms to fit width (may require vertical scroll)
    // - &pageView=actualSize - 100% actual size (default)
    function buildPowerBIUrl(viewMode) {
      let url = BASE_URL;
      
      // Remove any existing view parameters
      url = url.replace(/&pageView=[^&]*/g, '');
      url = url.replace(/\?pageView=[^&]*&?/g, '?');
      url = url.replace(/&navContentPaneEnabled=[^&]*/g, '');
      url = url.replace(/&filterPaneEnabled=[^&]*/g, '');
      
      // Clean up double ? or & issues
      if (url.includes('?') && url.endsWith('&')) {
        url = url.slice(0, -1);
      }
      
      // Add the view mode parameter
      let separator = url.includes('?') ? '&' : '?';
      url = url + separator + `pageView=${viewMode}`;
      
      // Optional: Hide navigation pane for cleaner view when zoomed out
      if (viewMode === 'fitToPage') {
        url = url + `&navContentPaneEnabled=false`;
        url = url + `&filterPaneEnabled=false`;
      }
      
      return url;
    }
    
    // Apply view mode
    function setViewMode(mode) {
      const newUrl = buildPowerBIUrl(mode);
      iframe.src = newUrl;
      
      // Update display
      switch(mode) {
        case 'fitToPage':
          viewModeDisplay.innerHTML = '🌍 Fit to Page (Full Dashboard Zoomed Out)';
          viewModeDisplay.style.background = "rgba(0, 120, 212, 0.5)";
          break;
        case 'fitToWidth':
          viewModeDisplay.innerHTML = '📏 Fit to Width';
          viewModeDisplay.style.background = "rgba(255, 165, 0, 0.4)";
          break;
        case 'actualSize':
          viewModeDisplay.innerHTML = '100% Actual Size';
          viewModeDisplay.style.background = "rgba(100, 100, 100, 0.4)";
          break;
      }
      
      // Save preference
      localStorage.setItem('cinco_view_mode', mode);
      console.log(`Power BI view mode set to: ${mode}`);
    }
    
    // Event handlers
    fitToPageBtn.addEventListener('click', () => setViewMode('fitToPage'));
    fitToWidthBtn.addEventListener('click', () => setViewMode('fitToWidth'));
    actualSizeBtn.addEventListener('click', () => setViewMode('actualSize'));
    
    // Load saved preference
    function loadSavedViewMode() {
      const savedMode = localStorage.getItem('cinco_view_mode');
      if (savedMode && (savedMode === 'fitToPage' || savedMode === 'fitToWidth' || savedMode === 'actualSize')) {
        setViewMode(savedMode);
      } else {
        // Default to fitToPage (zoomed out to show entire dashboard)
        setViewMode('fitToPage');
      }
    }
    
    // Handle iframe load
    iframe.addEventListener('load', function() {
      console.log('Power BI dashboard loaded');
    });
    
    // Initialize
    loadSavedViewMode();
    
    // Keyboard shortcuts
    window.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === '1') {
        e.preventDefault();
        setViewMode('fitToPage');
      } else if ((e.ctrlKey || e.metaKey) && e.key === '2') {
        e.preventDefault();
        setViewMode('fitToWidth');
      } else if ((e.ctrlKey || e.metaKey) && e.key === '0') {
        e.preventDefault();
        setViewMode('actualSize');
      }
    });
    
    console.log('CINCO 360 Dashboard Ready — Using Power BI native view modes');
  })();
</script>
</body>
</html>
